<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Software Hidrológico PRO</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f4f6f8;
}

header {
    background: #b8b9d4;
    color: white;
    text-align: center;
    padding: 20px;
}

.container {
    max-width: 1000px;
    margin: auto;
    padding: 20px;
}

.card {
    background: white;
    padding: 20px;
    margin-bottom: 20px;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

input, textarea {
    width: 100%;
    padding: 10px;
    margin-top: 5px;
    margin-bottom: 10px;
}

button {
    width: 100%;
    padding: 12px;
    background: #163a5f;
    color: white;
    border: none;
    cursor: pointer;
}

table {
    width: 100%;
    border-collapse: collapse;
}

th, td {
    border: 1px solid #ccc;
    padding: 8px;
    text-align: center;
}

th {
    background: #1f4e79;
    color: white;
}
</style>
</head>

<body>

<header>
<h1>🌊 Software Hidrológico PRO</h1>
</header>

<div class="container">

<!-- ================= ENTRADAS ================= -->
<div class="card">
<h2>Datos de entrada</h2>

<input id="Ac" placeholder="Área Ac (km²)">
<input id="L" placeholder="Longitud L (m)">
<input id="S" placeholder="Pendiente S">
<input id="D" placeholder="D">
<input id="Nc" placeholder="Nc">

<textarea id="lluvia">10 80
20 95
50 120</textarea>

<button onclick="calcular()">Calcular</button>
</div>

<!-- ================= TABLA ================= -->
<div class="card">
<h2>Resultados</h2>

<table>
<thead>
<tr>
<th>Tr</th>
<th>Racional</th>
<th>HUT</th>
<th>Chow</th>
<th>Promedio</th>
</tr>
</thead>
<tbody id="tabla"></tbody>
</table>
</div>

<!-- ================= GRÁFICA ================= -->
<div class="card">
<canvas id="grafica"></canvas>
</div>

</div>

<script>

// ================= FUNCIONES BASE =================

function xmed(Ac){
    return Math.exp(-0.00284 * Math.sqrt(Ac));
}

function Tc(L,S,D){
    return 0.000325 * Math.pow(L/Math.sqrt(S),0.77);
}

function e_interp(Tc){
    const p=[[0,0.8],[1,0.7],[6,0.6],[24,0.55],[48,0.5],[100,0.45]];
    for(let i=0;i<p.length-1;i++){
        if(Tc>=p[i][0] && Tc<=p[i+1][0]){
            return p[i][1] + (p[i+1][1]-p[i][1])*(Tc-p[i][0])/(p[i+1][0]-p[i][0]);
        }
    }
    return p[p.length-1][1];
}

function He(Hpd,Nc){
    let Hcm=Hpd/10;
    let Scm=508/Nc;
    let Ia=5.08;
    return ((Hcm-Scm+Ia)**2)/(Hcm+2032/Nc-20.32)*10;
}

function HUT(He,Ac,Tc){
    let Tp=1.1*Tc;
    let N=Ac<250?2:2+(Ac-250)/1583.33;
    return (0.556*He*Ac)/(N*Tp);
}

// ================= CALCULO =================

function calcular(){

let Ac=parseFloat(document.getElementById("Ac").value);
let L=parseFloat(document.getElementById("L").value);
let S=parseFloat(document.getElementById("S").value);
let D=parseFloat(document.getElementById("D").value);
let Nc=parseFloat(document.getElementById("Nc").value);

let lines=document.getElementById("lluvia").value.trim().split("\n");

let Tcval=Tc(L,S,D);
let e=e_interp(Tcval);
let xm=xmed(Ac);

let tabla=document.getElementById("tabla");
tabla.innerHTML="";

let labels=[],qr=[],qh=[],qc=[],qp=[];

for(let l of lines){

let [Tr,Hp]=l.split(" ").map(Number);

let X24=Hp*xm;
let K=(1-e)*X24/Math.pow(24,1-e);
let Hpd=(K*Math.pow(Tcval,1-e))/(1-e);
let hec=He(Hpd,Nc);

let Ce=hec/Hpd || 0;
let I=K/((1-e)*Math.pow(Tcval,e));

let Qr=0.278*Ce*I*Ac;
let Qh=HUT(hec,Ac,Tcval);
let Qc=Ac*(hec/Tcval)*0.278*0.82;

let Qp=(Qr+Qh+Qc)/3;

tabla.innerHTML+=`
<tr>
<td>${Tr}</td>
<td>${Qr.toFixed(3)}</td>
<td>${Qh.toFixed(3)}</td>
<td>${Qc.toFixed(3)}</td>
<td>${Qp.toFixed(3)}</td>
</tr>
`;

labels.push(Tr);
qr.push(Qr);
qh.push(Qh);
qc.push(Qc);
qp.push(Qp);

}

// ================= GRÁFICA =================

new Chart(document.getElementById("grafica"),{
type:"line",
data:{
labels:labels,
datasets:[
{label:"Racional",data:qr,borderColor:"red"},
{label:"HUT",data:qh,borderColor:"blue"},
{label:"Chow",data:qc,borderColor:"green"},
{label:"Promedio",data:qp,borderColor:"black"}
]
}
});

}

</script>

</body>
</html>
