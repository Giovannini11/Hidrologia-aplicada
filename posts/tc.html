    <h1>Tiempo de Concentración (Tc)</h1>

    <p>El tiempo de concentración es el tiempo que tarda el agua en viajar desde el punto más lejano de la cuenca hasta la salida.</p>

    <h2>Método de Kirpich</h2>
    <p>Se usa para cuencas pequeñas:</p>

    <p>Tc = 0.0195 * L^0.77 * S^-0.385</p>
